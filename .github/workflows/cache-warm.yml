name: Warm BST Cache

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: krytis-cache-warm
  cancel-in-progress: false

jobs:
  warm-cache:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true


      - name: Install system dependencies
        run: mise bootstrap --yes

      - name: Install Python dependencies
        run: uv sync

      - name: Generate image version
        run: mise run generate-image-version

      - name: Configure BuildStream
        env:
          BUILDBARN_PUSH_TOKEN: ${{ secrets.BUILDBARN_PUSH_TOKEN }}
          BUILDBARN_PULL_TOKEN: ${{ secrets.BUILDBARN_PULL_TOKEN }}
        run: |
          mkdir -p ~/.config
          cat > ~/.config/buildstream.conf <<'EOF'
          scheduler:
            fetchers: 10
            builders: 4
            pushers: 5
            network-retries: 3
          logging:
            key-length: 8
            verbose: False
          cache:
            quota: 50G
          EOF

          # Wire krytis's bow Buildbarn cache into user config (#340). Not
          # declared in project.conf at all — bow requires a bearer token for
          # every RPC, read or write, and no token is ever committed to this
          # repo, so a project.conf entry could never authenticate. Push and
          # pull are minted as separate JWT roles (materia's
          # `mise buildbarn:mint-token --role push|pull`); prefer push when
          # available since a push-capable connection also serves reads,
          # falling back to a pull-only token so cache-warm still benefits
          # from bow's existing cache even when push isn't configured (e.g.
          # secret not yet provisioned, or rotated out). Both degrade
          # gracefully to a plain build with no bow entries if neither secret
          # is set.
          if [ -n "${BUILDBARN_PUSH_TOKEN}" ]; then
            TOKEN_FILE="${RUNNER_TEMP}/buildbarn-token"
            printf '%s' "${BUILDBARN_PUSH_TOKEN}" > "${TOKEN_FILE}"
            chmod 600 "${TOKEN_FILE}"
            PUSH_FLAG="true"
            echo "::notice::Buildbarn push wired — sources/artifacts will push to bow as they build"
          elif [ -n "${BUILDBARN_PULL_TOKEN}" ]; then
            TOKEN_FILE="${RUNNER_TEMP}/buildbarn-token"
            printf '%s' "${BUILDBARN_PULL_TOKEN}" > "${TOKEN_FILE}"
            chmod 600 "${TOKEN_FILE}"
            PUSH_FLAG="false"
            echo "::notice::Buildbarn pull wired — cache-warm will read from bow but not push"
          else
            TOKEN_FILE=""
            echo "::warning::Neither BUILDBARN_PUSH_TOKEN nor BUILDBARN_PULL_TOKEN set — cache-warm will build without bow"
          fi

          if [ -n "${TOKEN_FILE}" ]; then
            cat >> ~/.config/buildstream.conf <<EOF2
          artifacts:
            servers:
            - url: https://bst-cache.ririi.dev:7981
              type: index
              push: ${PUSH_FLAG}
              auth:
                server-cert: ${GITHUB_WORKSPACE}/quadlet/buildbarn/certs/bow-server.crt
                access-token: ${TOKEN_FILE}
            - url: https://bst-cache.ririi.dev:7982
              type: storage
              push: ${PUSH_FLAG}
              auth:
                server-cert: ${GITHUB_WORKSPACE}/quadlet/buildbarn/certs/bow-server.crt
                access-token: ${TOKEN_FILE}

          source-caches:
            servers:
            - url: https://bst-cache.ririi.dev:7981
              type: index
              push: ${PUSH_FLAG}
              auth:
                server-cert: ${GITHUB_WORKSPACE}/quadlet/buildbarn/certs/bow-server.crt
                access-token: ${TOKEN_FILE}
            - url: https://bst-cache.ririi.dev:7982
              type: storage
              push: ${PUSH_FLAG}
              auth:
                server-cert: ${GITHUB_WORKSPACE}/quadlet/buildbarn/certs/bow-server.crt
                access-token: ${TOKEN_FILE}
          EOF2
          fi

      - name: Enable unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Print disk usage before build
        run: df -h

      - name: Build image
        run: |
          set +e
          uv run bst -o x86_64_v3 true --no-interactive build oci/krytis/image.bst
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::warning::Cache warm build failed (rc=${rc}) — non-blocking"
          fi
          exit 0

      - name: Print disk usage after build
        if: always()
        run: |
          df -h
          du -sh ~/.cache/buildstream

      - name: Report cached elements
        if: always()
        run: |
          CACHED=$(uv run bst show --deps all --format '%{name} %{state}' oci/krytis/image.bst 2>/dev/null | grep -c "cached" || echo 0)
          echo "::notice::Cached elements: ${CACHED}"
