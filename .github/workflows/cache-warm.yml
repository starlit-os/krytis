name: Warm BST Cache

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: krytis-cache-warm
  cancel-in-progress: false

jobs:
  warm-cache:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true


      - name: Install system dependencies
        run: mise bootstrap --yes

      - name: Install Python dependencies
        run: uv sync

      - name: Generate image version
        run: mise run generate-image-version

      - name: Configure BuildStream
        env:
          BUILDBARN_PUSH_TOKEN: ${{ secrets.BUILDBARN_PUSH_TOKEN }}
        run: |
          mkdir -p ~/.config
          cat > ~/.config/buildstream.conf <<'EOF'
          scheduler:
            fetchers: 10
            builders: 4
            pushers: 5
            network-retries: 3
          logging:
            key-length: 8
            verbose: False
          cache:
            quota: 50G
          EOF

          # Push krytis-built sources/artifacts into the bow Buildbarn cache as
          # they build (#340) — additive alongside project.conf's read-only bow
          # entries, tried first since user-config remotes are consulted before
          # project-recommended ones. Skipped (build-only, no push) if the
          # BUILDBARN_PUSH_TOKEN secret isn't configured, so a missing secret
          # degrades gracefully instead of breaking the warm build.
          if [ -n "${BUILDBARN_PUSH_TOKEN}" ]; then
            TOKEN_FILE="${RUNNER_TEMP}/buildbarn-push-token"
            printf '%s' "${BUILDBARN_PUSH_TOKEN}" > "${TOKEN_FILE}"
            chmod 600 "${TOKEN_FILE}"

            cat >> ~/.config/buildstream.conf <<EOF2
          artifacts:
            servers:
            - url: https://bst-cache.ririi.dev:7981
              type: index
              push: true
              auth:
                server-cert: ${GITHUB_WORKSPACE}/quadlet/buildbarn/certs/bow-server.crt
                access-token: ${TOKEN_FILE}
            - url: https://bst-cache.ririi.dev:7982
              type: storage
              push: true
              auth:
                server-cert: ${GITHUB_WORKSPACE}/quadlet/buildbarn/certs/bow-server.crt
                access-token: ${TOKEN_FILE}

          source-caches:
            servers:
            - url: https://bst-cache.ririi.dev:7981
              type: index
              push: true
              auth:
                server-cert: ${GITHUB_WORKSPACE}/quadlet/buildbarn/certs/bow-server.crt
                access-token: ${TOKEN_FILE}
            - url: https://bst-cache.ririi.dev:7982
              type: storage
              push: true
              auth:
                server-cert: ${GITHUB_WORKSPACE}/quadlet/buildbarn/certs/bow-server.crt
                access-token: ${TOKEN_FILE}
          EOF2
            echo "::notice::Buildbarn push wired — sources/artifacts will push to bow as they build"
          else
            echo "::warning::BUILDBARN_PUSH_TOKEN not set — cache-warm will build locally without pushing to bow"
          fi

      - name: Enable unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Print disk usage before build
        run: df -h

      - name: Build image
        run: |
          set +e
          uv run bst -o x86_64_v3 true --no-interactive build oci/krytis/image.bst
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::warning::Cache warm build failed (rc=${rc}) — non-blocking"
          fi
          exit 0

      - name: Print disk usage after build
        if: always()
        run: |
          df -h
          du -sh ~/.cache/buildstream

      - name: Report cached elements
        if: always()
        run: |
          CACHED=$(uv run bst show --deps all --format '%{name} %{state}' oci/krytis/image.bst 2>/dev/null | grep -c "cached" || echo 0)
          echo "::notice::Cached elements: ${CACHED}"
