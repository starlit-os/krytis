name: Warm BST Cache

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: krytis-cache-warm
  cancel-in-progress: false

jobs:
  warm-cache:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true


      - name: Install system dependencies
        run: mise bootstrap --yes

      - name: Install Python dependencies
        run: uv sync

      - name: Generate image version
        run: mise run generate-image-version

      - name: Configure BuildStream
        run: |
          mkdir -p ~/.config
          cat > ~/.config/buildstream.conf <<'EOF'
          scheduler:
            fetchers: 10
            builders: 4
            pushers: 5
            network-retries: 3
          logging:
            key-length: 8
            verbose: False
          cache:
            quota: 50G
          EOF

      - name: Enable unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Print disk usage before build
        run: df -h

      - name: Build image
        run: |
          set +e
          bst -o x86_64_v3 true --no-interactive build oci/krytis/image.bst
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::warning::Cache warm build failed (rc=${rc}) — non-blocking"
          fi
          exit 0

      - name: Print disk usage after build
        if: always()
        run: |
          df -h
          du -sh ~/.cache/buildstream

      - name: Report cached elements
        if: always()
        run: |
          CACHED=$(bst show --deps all --format '%{name} %{state}' oci/krytis/image.bst 2>/dev/null | grep -c "cached" || echo 0)
          echo "::notice::Cached elements: ${CACHED}"
