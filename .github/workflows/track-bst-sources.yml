name: Track BuildStream Sources

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      group:
        description: 'Which element group to track'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux-cachyos
          - mise
          - niri
          - ghostty
          - manual-merge
          - core-junctions

permissions: read-all

jobs:
  track-linux-cachyos:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    if: >-
      github.event.inputs.group == 'all' ||
      github.event.inputs.group == 'linux-cachyos' ||
      github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      - name: Read current version
        id: current
        run: |
          ELEMENT="elements/core/linux-cachyos.bst"
          VER=$(awk '/^  version:/{gsub(/"/, "", $2); print $2}' "$ELEMENT")
          REL=$(awk '/^  pkgrel:/{gsub(/"/, "", $2); print $2}' "$ELEMENT")
          echo "version=${VER}-${REL}" >> "$GITHUB_OUTPUT"

      - name: Update linux-cachyos element
        run: mise run kernel-update

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet elements/core/linux-cachyos.bst; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Read new version
        if: steps.changes.outputs.has_changes == 'true'
        id: new
        run: |
          ELEMENT="elements/core/linux-cachyos.bst"
          VER=$(awk '/^  version:/{gsub(/"/, "", $2); print $2}' "$ELEMENT")
          REL=$(awk '/^  pkgrel:/{gsub(/"/, "", $2); print $2}' "$ELEMENT")
          echo "version=${VER}-${REL}" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_VER="${{ steps.current.outputs.version }}"
          NEW_VER="${{ steps.new.outputs.version }}"
          BRANCH="auto/track-linux-cachyos"
          TITLE="chore(deps): update linux-cachyos ${OLD_VER} -> ${NEW_VER}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash the update, switch to a fresh branch from main, then re-apply
          # so the PR diff is relative to main — not the detached checkout HEAD.
          git stash push -- elements/core/linux-cachyos.bst
          git checkout -B "$BRANCH" origin/main
          git stash pop

          git add elements/core/linux-cachyos.bst
          git commit -m "$TITLE"
          git push --force-with-lease origin "$BRANCH"

          {
            echo "## linux-cachyos update: \`${OLD_VER}\` → \`${NEW_VER}\`"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| **Source** | [CachyOS/linux-cachyos](https://github.com/CachyOS/linux-cachyos) |"
            echo "| **Version** | \`${OLD_VER}\` → \`${NEW_VER}\` |"
            echo "| **Releases** | [https://github.com/CachyOS/linux-cachyos/releases](https://github.com/CachyOS/linux-cachyos/releases) |"
            echo ""
            echo "---"
            echo "*Generated by [Track BuildStream Sources](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          } > /tmp/pr-body.md

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body-file /tmp/pr-body.md
            PR_URL=$(gh pr view "$EXISTING_PR" --json url --jq '.url')
          else
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body-file /tmp/pr-body.md)
          fi
          echo "PR: $PR_URL"

  track-mise:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    if: >-
      github.event.inputs.group == 'all' ||
      github.event.inputs.group == 'mise' ||
      github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      - name: Read current version
        id: current
        run: |
          echo "version=$(grep -oP 'download/v\K[^/]+' elements/core/mise.bst | head -1)" >> "$GITHUB_OUTPUT"

      - name: Update mise element
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run mise-update

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet elements/core/mise.bst; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Read new version
        if: steps.changes.outputs.has_changes == 'true'
        id: new
        run: |
          echo "version=$(grep -oP 'download/v\K[^/]+' elements/core/mise.bst | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_VER="${{ steps.current.outputs.version }}"
          NEW_VER="${{ steps.new.outputs.version }}"
          BRANCH="auto/track-mise"
          TITLE="chore(deps): update mise ${OLD_VER} -> ${NEW_VER}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git stash push -- elements/core/mise.bst
          git checkout -B "$BRANCH" origin/main
          git stash pop

          git add elements/core/mise.bst
          git commit -m "$TITLE"
          git push --force-with-lease origin "$BRANCH"

          {
            echo "## mise update: \`${OLD_VER}\` → \`${NEW_VER}\`"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| **Source** | [jdx/mise](https://github.com/jdx/mise) |"
            echo "| **Version** | \`${OLD_VER}\` → \`${NEW_VER}\` |"
            echo "| **Releases** | [https://github.com/jdx/mise/releases](https://github.com/jdx/mise/releases) |"
            echo ""
            echo "---"
            echo "*Generated by [Track BuildStream Sources](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          } > /tmp/pr-body.md

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body-file /tmp/pr-body.md
            PR_URL=$(gh pr view "$EXISTING_PR" --json url --jq '.url')
          else
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body-file /tmp/pr-body.md)
          fi
          echo "PR: $PR_URL"

  track-niri:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    if: >-
      github.event.inputs.group == 'all' ||
      github.event.inputs.group == 'niri' ||
