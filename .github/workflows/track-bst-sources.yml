            echo "| **Releases** | [https://github.com/ghostty-org/ghostty/releases](https://github.com/ghostty-org/ghostty/releases) |"
            echo ""
            echo "> **Note:** The dep list change is substantial — review the diff carefully before merging."
            echo ""
            echo "---"
            echo "*Generated by [Track BuildStream Sources](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          } > /tmp/pr-body.md

