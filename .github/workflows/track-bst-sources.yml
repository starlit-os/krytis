        id: current
        run: |
          echo "version=$(grep -oP 'ghostty_releases:\S+/ghostty-\K[^.]+(\.[^.]+)*(?=\.tar)' elements/desktop/ghostty.bst | head -1)" >> "$GITHUB_OUTPUT"

