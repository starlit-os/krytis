      - name: Read new version
        if: steps.changes.outputs.has_changes == 'true'
        id: new
        run: |
          echo "version=$(grep -oP 'refs/tags/v\K[^\s/]+(?=\.tar\.gz)' elements/desktop/niri.bst | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true'
