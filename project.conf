name: krytis

# Required BuildStream version
min-version: 2.5

# Subdirectory where elements are stored
element-path: elements

(@):
  - freedesktop-sdk.bst:include/runtime.yml
  - include/aliases.yml

options:
  arch:
    type: arch
    description: Machine architecture
    variable: arch
    values:
      - x86_64
  x86_64_v3:
    type: bool
    description: Enable x86_64-v3 (AVX2) optimisations
    default: true

fatal-warnings:
  - overlaps
  - unaliased-url
  - unstaged-files

sandbox:
  build-arch: "%{arch}"

variables:
  (@):
    - freedesktop-sdk.bst:include/repo_branches.yml
    - include/variables.yml
    - include/image-version.yml
  branch: 25.08
  (?):
    - arch == "x86_64":
        go-arch: "amd64"
        systemd-arch: "x86-64"
    - arch == "aarch64":
        go-arch: "arm64"
        systemd-arch: "arm64"

artifacts:
  - url: https://gbm.gnome.org:11003
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180
  - url: https://cache.projectbluefin.io:11001
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180

source-caches:
  # krytis-owned Buildbarn remote-asset (source cache) — see #234/#338/#339.
  # Retains krytis-specific sources (e.g. linux-cachyos .pkg.tar.zst) so
  # upstream removals like #233's CachyOS 404 don't break bst fetch on a
  # cold cache. Read-only here — write access is configured separately in
  # user config (see docs/skills/ci-runner.md).
  #
  # Buildbarn splits the remote-asset index (bb-asset, URI-to-digest
  # lookup) from the CAS storage (bb-storage, actual blob content) across
  # two services/ports — BuildStream needs both named explicitly via
  # type: index / type: storage; a single unsplit entry (the default
  # type: all) assumes one endpoint serves both and fails with
  # "unknown service ...ContentAddressableStorage" against bb-asset alone.
  #
  # Points at the deployed bow instance (materia repo, issue #28), not
  # the local-only dev-test server used during initial design/verification
  # (see quadlet/buildbarn/certs/ca.crt and docs/skills/ci-runner.md for
  # that flow, still valid for local iteration). bow's server cert is
  # self-signed (no CA) — auth here is server-only TLS; the actual access
  # control is a JWT bearer token configured in user config, not a client
  # cert (see docs/skills/ci-runner.md).
  - url: https://bst-cache.ririi.dev:7981
    type: index
    auth:
      server-cert: quadlet/buildbarn/certs/bow-server.crt
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180
  - url: https://bst-cache.ririi.dev:7982
    type: storage
    auth:
      server-cert: quadlet/buildbarn/certs/bow-server.crt
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180
  - url: https://gbm.gnome.org:11003
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180
  - url: https://cache.projectbluefin.io:11001
    connection-config:
      keepalive-time: 180
      retry-limit: 5
      retry-delay: 500
      request-timeout: 180

plugins:
  - origin: junction
    junction: plugins/buildstream-plugins.bst
    elements:
      - autotools
      - meson
      - cmake
      - make
    sources:
      - patch

  - origin: junction
    junction: plugins/buildstream-plugins-community.bst
    elements:
      - collect_manifest
      - pyproject
    sources:
      - cargo2
      - git_module
      - git_repo
      - go_module
      - patch_queue
      - zip

  - origin: junction
    junction: gnome-build-meta.bst
    elements:
      - collect_initial_scripts

junctions:
  internal:
  - plugins/buildstream-plugins.bst
  - plugins/buildstream-plugins-community.bst

sources:
  git_repo:
    config:
      ref-format: git-describe
