# Tracks fork repos mined for lessons applicable to krytis.
#
# Updated by the `upstream-lessons` skill (.claude/skills/upstream-lessons/)
# each time it finishes a mining pass. `last_checked_sha` is the fork commit
# that was HEAD when lessons were last extracted from that repo — the next
# pass diffs from this SHA to the fork's new HEAD to find what's new.
#
# See docs/skills/upstream-sync.md for the full workflow and
# https://github.com/starlit-os/krytis/issues/141 for the design rationale.
#
# local_path is a directory name, resolved as a sibling of krytis's *main*
# checkout (not the invoking worktree — `mise upstream-sync` resolves this via
# `git worktree list`, since worktrees live elsewhere on disk).

repos:
  - name: dakota
    fork: starlit-os/dakota
    upstream: projectbluefin/dakota
    branch: main
    local_path: dakota
    skill_file: docs/skills/dakota.md
    last_checked_sha: dde8975c1408c25e994580ec984117d706495324
    last_checked_date: "2026-07-09"

  - name: zirconium-hawaii
    fork: starlit-os/zirconium-hawaii
    upstream: zirconium-dev/zirconium-hawaii
    branch: stable
    local_path: zirconium-hawaii
    skill_file: docs/skills/zirconium-hawaii.md
    last_checked_sha: caf71a294e09bd51ab711e167e887dc75cae4245
    last_checked_date: "2026-07-09"
