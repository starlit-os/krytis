[tool_alias]
# pass-cli has no aqua/asdf backend; resolve the short name to the GitHub backend.
pass-cli = "github:protonpass/pass-cli"

[tools]
usage = "latest"
python = "3.12"
uv = "latest"
gum = "latest"
bat = "latest"
# `just` drives the dakota-iso ISO build pipeline (mise run build-iso).
# Sourced from mise (aqua) rather than a BST element — it is dev-host
# tooling, not part of the shipped OS runtime.
just = "latest"
# pass-cli: required by `mise run pull-keys` (#311) to authenticate against the
# Proton Pass vault holding secure boot signing keys. Dev-host tooling only.
pass-cli = "latest"

[settings]
python.uv_venv_auto = "create|source"

[deps.uv]
auto = true
sources = ["pyproject.toml", "uv.lock"]
outputs = [".venv/"]
run = "uv sync"

[bootstrap.packages]
"apt:bubblewrap" = "latest"
"apt:lzip" = "latest"
"apt:xz-utils" = "latest"
"apt:bzip2" = "latest"
"apt:gzip" = "latest"
"apt:patch" = "latest"
"dnf:bubblewrap" = "latest"
"dnf:lzip" = "latest"
"dnf:xz" = "latest"
"dnf:bzip2" = "latest"
"dnf:gzip" = "latest"
"dnf:patch" = "latest"

[env]
# { default = "..." } keeps the shell value if already set; only applies the
# fallback when the variable is absent. Requires mise ≥ 2026.6.10.
BST2_IMAGE = { default = "registry.gitlab.com/freedesktop-sdk/infrastructure/freedesktop-sdk-docker-images/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d" }
BST_MEMORY_LIMIT = { default = "16g" }
VM_RAM = { default = "8192" }
VM_CPUS = { default = "4" }
RUNNER_IMAGE = { default = "localhost/krytis-runner:latest" }
RUNNER_VERSION = { default = "2.325.0" }
RUNNER_NAME = { default = "krytis-local" }
RUNNER_LABELS = { default = "self-hosted,linux,x64" }
