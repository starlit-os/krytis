# Set amd-pstate-epp energy_performance_preference to balance_performance.
# Requires amd-pstate-epp driver (linux-cachyos enables amd_pstate=active by default).
# balance_performance: responsive under load, not pinned to max frequency at idle.
w /sys/devices/system/cpu/cpufreq/policy*/energy_performance_preference - - - - balance_performance
